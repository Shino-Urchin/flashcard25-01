        const INITIAL_CARDS = [
            { id: 1, category: "内分泌系・神経系", front: "体内環境が一定の範囲に保たれる性質を何というか？", back: "恒常性（ホメオスタシス）" },

            { id: 36, category: "生体防御", front: "他の動物に作らせた抗体で治療する方法は？", back: "血清療法" },

            { id: 42, category: "ホルモンテスト", front: "【内分泌腺】間脳の視床下部\n【機能】脳下垂体前葉の分泌を抑制する", back: "放出抑制ホルモン" },
            { id: 43, category: "ホルモンテスト", front: "【内分泌腺】脳下垂体前葉\n【機能】タンパク質合成・成長促進・血糖上昇", back: "成長ホルモン" },

            { id: 45, category: "ホルモンテスト", front: "【内分泌腺】脳下垂体前葉\n【機能】副腎皮質の発育と糖質分泌を促進", back: "副腎皮質刺激ホルモン" },
            { id: 46, category: "ホルモンテスト", front: "【内分泌腺】脳下垂体後葉\n【機能】腎臓での水の再吸収を促進・尿量減少", back: "バソプレシン" },
            { id: 47, category: "ホルモンテスト", front: "【内分泌腺】甲状腺\n【機能】代謝促進。ヨウ素を含む", back: "チロキシン" },
            { id: 48, category: "ホルモンテスト", front: "【内分泌腺】副甲状腺\n【機能】血中のCaイオン濃度を上昇させる", back: "パラトルモン" },
            { id: 49, category: "ホルモンテスト", front: "【内分泌腺】すい臓A細胞\n【機能】グリコーゲン分解を促進し、血糖上昇", back: "グルカゴン" },
            { id: 50, category: "ホルモンテスト", front: "【内分泌腺】すい臓B細胞\n【機能】グルコース消費と合成を促進し、血糖低下", back: "インスリン" },
            { id: 51, category: "ホルモンテスト", front: "【内分泌腺】副腎髄質\n【機能】交感神経の刺激を受け、血糖を上昇させる", back: "アドレナリン" },
            { id: 52, category: "ホルモンテスト", front: "【内分泌腺】副腎皮質\n【機能】タンパク質からの糖の合成を促進", back: "糖質コルチコイド" },
            { id: 53, category: "ホルモンテスト", front: "【内分泌腺】副腎皮質\n【機能】腎臓でのNaイオン再吸収を促進", back: "鉱質コルチコイド" },
            { id: 54, category: "ホルモンテスト", front: "【内分泌腺】脳下垂体後葉\n【機能】血圧上昇作用も持つ体液調節ホルモン", back: "バソプレシン" },
            { id: 55, category: "ホルモンテスト", front: "【内分泌腺】すい臓B細胞\n【機能】糖尿病において分泌不足が問題となるのは？", back: "インスリン" },
            { id: 56, category: "ホルモンテスト", front: "【内分泌腺】副腎髄質\n【機能】ストレスに反応し分泌、心拍数を増加させる", back: "アドレナリン" },
            { id: 57, category: "ホルモンテスト", front: "【内分泌腺】甲状腺\n【機能】両生類の変態を促進", back: "チロキシン" },
            { id: 58, category: "ホルモンテスト", front: "【内分泌腺】間脳の視床下部\n【機能】脳下垂体後葉へ送られる代表的なホルモン", back: "バソプレシン" },
            { id: 59, category: "ホルモンテスト", front: "【内分泌腺】脳下垂体前葉\n【機能】副腎を標的とする「刺激ホルモン」", back: "副腎皮質刺激ホルモン" },
            { id: 60, category: "ホルモンテスト", front: "【内分泌腺】副腎皮質\n【機能】血糖維持に働くステロイドホルモンの一種", back: "糖質コルチコイド" }
        ];

        const App = () => {
            const [view, setView] = useState('menu');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [speaking, setSpeaking] = useState(false);
            const [isReverseMode, setIsReverseMode] = useState(false);
            const [isShuffleMode, setIsShuffleMode] = useState(false);
            const [isQuizMode, setIsQuizMode] = useState(false);
            const [isWeakOnlyMode, setIsWeakOnlyMode] = useState(false);
            const [quizFeedback, setQuizFeedback] = useState(null); // 'correct' | 'wrong'
            const [learnedIds, setLearnedIds] = useState(() => {
                const saved = localStorage.getItem('bio_learned_ids');
                return saved ? JSON.parse(saved) : [];
            });

            // データの保存
            useEffect(() => {
                localStorage.setItem('bio_learned_ids', JSON.stringify(learnedIds));
            }, [learnedIds]);

            // カテゴリ・フィルタ・シャッフルを適用したカードリスト
            const displayCards = useMemo(() => {
                let filtered = INITIAL_CARDS.filter(c => c.category === selectedCategory);
                if (isWeakOnlyMode) {
                    filtered = filtered.filter(c => !learnedIds.includes(c.id));
                }
                if (isShuffleMode) {
                    const shuffled = [...filtered];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    return shuffled;
                }
                return filtered;
            }, [selectedCategory, isShuffleMode, isWeakOnlyMode, learnedIds]);

            const currentCard = displayCards[currentIndex];
            const learnedCount = INITIAL_CARDS.filter(c => c.category === selectedCategory && learnedIds.includes(c.id)).length;
            const totalCount = INITIAL_CARDS.filter(c => c.category === selectedCategory).length;

            const displayFront = isReverseMode ? currentCard?.back : currentCard?.front;
            const displayBack = isReverseMode ? currentCard?.front : currentCard?.back;

            // クイズの選択肢生成
            const quizOptions = useMemo(() => {
                if (!currentCard || !isQuizMode) return [];
                const correct = isReverseMode ? currentCard.front : currentCard.back;
                const pool = INITIAL_CARDS
                    .filter(c => c.category === selectedCategory && c.id !== currentCard.id)
                    .map(c => isReverseMode ? c.front : c.back);
                
                const options = [correct];
                while (options.length < 4 && pool.length > 0) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    const option = pool.splice(randomIndex, 1)[0];
                    if (!options.includes(option)) options.push(option);
                }
                return options.sort(() => Math.random() - 0.5);
            }, [currentCard, isQuizMode, isReverseMode, selectedCategory]);

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const uttr = new SpeechSynthesisUtterance(text);
                    uttr.lang = 'ja-JP';
                    uttr.onstart = () => setSpeaking(true);
                    uttr.onend = () => setSpeaking(false);
                    window.speechSynthesis.speak(uttr);
                }
            };

            const toggleLearned = (id) => {
                setLearnedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const handleAnswer = (option) => {
                const correct = isReverseMode ? currentCard.front : currentCard.back;
                if (option === correct) {
                    setQuizFeedback('correct');
                    // 「覚えた」リストへの自動追加を削除
                    setTimeout(() => {
                        setQuizFeedback(null);
                        setCurrentIndex((prev) => (prev + 1) % displayCards.length);
                        setIsFlipped(false);
                    }, 800);
                } else {
                    setQuizFeedback('wrong');
                    setTimeout(() => setQuizFeedback(null), 800);
                }
            };

            if (view === 'menu') {
                return (
                    <div className="min-h-screen p-6 max-w-lg mx-auto flex flex-col justify-center animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl font-black text-slate-800 mb-2 tracking-tight">生物基礎<span className="text-blue-600">マスター</span></h1>
                            <p className="text-slate-400 font-bold text-xs tracking-widest uppercase">Biology Essentials Pro</p>
                        </div>
                        <div className="space-y-4">
                            {[
                                { title: "内分泌系・神経系", icon: "brain", color: "blue" },
                                { title: "生体防御", icon: "shield", color: "green" },
                                { title: "ホルモンテスト", icon: "flask", color: "indigo" }
                            ].map((item) => {
                                const count = INITIAL_CARDS.filter(c => c.category === item.title && learnedIds.includes(c.id)).length;
                                return (
                                    <button 
                                        key={item.title}
                                        onClick={() => { setSelectedCategory(item.title); setCurrentIndex(0); setView('study'); }}
                                        className="group w-full bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:border-blue-500 hover:shadow-xl hover:-translate-y-1 transition-all flex items-center gap-5"
                                    >
                                        <div className={`p-4 rounded-2xl bg-${item.color}-50 text-${item.color}-600 group-hover:scale-110 transition-transform`}>
                                            <Icon name={item.icon} />
                                        </div>
                                        <div className="text-left flex-1">
                                            <h2 className="font-black text-lg text-slate-800">{item.title}</h2>
                                            <div className="flex items-center gap-2 mt-1">
                                                <div className="w-full max-w-[80px] bg-slate-100 h-1 rounded-full overflow-hidden">
                                                    <div className={`h-full bg-${item.color}-500`} style={{ width: `${(count/20)*100}%` }}></div>
                                                </div>
                                                <span className="text-[10px] font-bold text-slate-400">{count}/20</span>
                                            </div>
                                        </div>
                                        <Icon name="chevron-right" className="text-slate-200 group-hover:text-blue-500 transition-colors" />
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 max-w-lg mx-auto flex flex-col animate-in fade-in duration-500">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('menu')} className="p-3 bg-white rounded-2xl text-slate-400 shadow-sm border border-slate-100 hover:text-slate-800"><Icon name="menu" /></button>
                        <div className="text-center">
                            <span className="text-[10px] font-black text-slate-400 tracking-tighter block uppercase">Chapter</span>
                            <span className="text-xs font-black text-slate-800">{selectedCategory}</span>
                        </div>
                        <div className="flex gap-2">
                            <button 
                                onClick={() => { setIsWeakOnlyMode(!isWeakOnlyMode); setCurrentIndex(0); }} 
                                className={`p-3 rounded-2xl transition-all shadow-sm border ${isWeakOnlyMode ? 'bg-yellow-500 text-white border-yellow-400' : 'bg-white text-slate-300 border-slate-100'}`}
                                title="苦手克服モード"
                            >
                                <Icon name="star" className="w-4 h-4" />
                            </button>
                            <button 
                                onClick={() => { setIsQuizMode(!isQuizMode); setIsFlipped(false); }} 
                                className={`p-3 rounded-2xl transition-all shadow-sm border ${isQuizMode ? 'bg-blue-600 text-white border-blue-500' : 'bg-white text-slate-300 border-slate-100'}`}
                                title="クイズモード"
                            >
                                <Icon name="help-circle" className="w-4 h-4" />
                            </button>
                        </div>
                    </div>

                    {/* Progress Bar */}
                    <div className="mb-8 px-2">
                        <div className="flex justify-between text-[10px] font-black text-slate-400 mb-2">
                            <span className="flex items-center gap-1"><Icon name="check-circle" className="w-3 h-3 text-green-500"/> 進捗度 {learnedCount} / {totalCount}</span>
                            <span>{Math.round((learnedCount / totalCount) * 100)}%</span>
                        </div>
                        <div className="w-full bg-white h-2 rounded-full p-0.5 shadow-inner">
                            <div className="bg-gradient-to-r from-blue-400 to-blue-600 h-full rounded-full transition-all duration-700 ease-out" style={{ width: `${(learnedCount / totalCount) * 100}%` }}></div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    {displayCards.length === 0 ? (
                        <div className="flex-1 flex flex-col items-center justify-center text-center p-10 bg-white rounded-[40px] shadow-sm border border-slate-100 animate-in zoom-in duration-500">
                            <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4">
                                <Icon name="check-circle" className="w-10 h-10" />
                            </div>
                            <h3 className="text-xl font-black text-slate-800 mb-2">素晴らしい！全問達成！</h3>
                            <p className="text-sm text-slate-400 font-bold mb-6">このカテゴリの苦手項目はすべて克服されました。</p>
                            <button onClick={() => { setIsWeakOnlyMode(false); setCurrentIndex(0); }} className="px-8 py-3 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">全カードで復習する</button>
                        </div>
                    ) : isQuizMode ? (
                        /* Quiz View */
                        <div className="flex-1 flex flex-col">
                            <div className={`relative flex-1 min-h-[160px] bg-white rounded-[40px] shadow-sm border-2 ${quizFeedback === 'correct' ? 'border-green-400 bg-green-50' : quizFeedback === 'wrong' ? 'border-red-400 bg-red-50' : 'border-slate-50'} px-8 pt-16 pb-10 flex flex-col items-center justify-center mb-6 transition-all`}>
                                <div className="absolute top-6 left-1/2 -translate-x-1/2 px-4 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black uppercase tracking-widest whitespace-nowrap">Question {currentIndex + 1}</div>
                                <p className="text-lg font-bold text-center leading-relaxed text-slate-700 whitespace-pre-wrap">{displayFront}</p>
                            </div>
                            <div className="grid grid-cols-1 gap-3 mb-8">
                                {quizOptions.map((option, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => handleAnswer(option)}
                                        className="group bg-white p-5 rounded-3xl border-2 border-slate-100 shadow-sm hover:border-blue-500 hover:bg-blue-50 transition-all text-left flex items-center gap-4"
                                    >
                                        <div className="w-8 h-8 rounded-xl bg-slate-50 text-slate-400 font-black flex items-center justify-center group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors shrink-0">{idx + 1}</div>
                                        <span className="font-bold text-slate-700 leading-tight">{option}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        /* Flashcard View */
                        <div className="flex-1 flex flex-col">
                            <div className="perspective-1000 h-80 w-full mb-8 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                                <div className={`relative w-full h-full transition-all duration-700 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                                    <div className="absolute inset-0 bg-white border-b-8 border-blue-500 rounded-[40px] card-shadow flex flex-col items-center justify-center p-10 backface-hidden">
                                        <button onClick={(e) => { e.stopPropagation(); speak(displayFront); }} className={`absolute top-6 right-6 p-3 rounded-2xl ${speaking ? 'bg-blue-100 text-blue-600 scale-110' : 'bg-slate-50 text-slate-200'} transition-all`}><Icon name="volume-2" /></button>
                                        <p className={`text-center leading-relaxed whitespace-pre-wrap font-bold ${isReverseMode ? 'text-4xl text-blue-600' : 'text-xl text-slate-700'}`}>{displayFront}</p>
                                        <span className="absolute bottom-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Tap to flip</span>
                                    </div>
                                    <div className="absolute inset-0 bg-blue-600 border-b-8 border-blue-800 rounded-[40px] card-shadow flex flex-col items-center justify-center p-10 rotate-y-180 backface-hidden text-white text-center">
                                        <button onClick={(e) => { e.stopPropagation(); speak(displayBack); }} className="absolute top-6 right-6 p-3 bg-blue-700 rounded-2xl"><Icon name="volume-2" /></button>
                                        <p className={`leading-relaxed whitespace-pre-wrap font-bold ${!isReverseMode ? 'text-4xl' : 'text-lg text-blue-100'}`}>{displayBack}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Flashcard Controls */}
                            <div className="flex gap-4 mb-10">
                                <button onClick={() => { setIsFlipped(false); setCurrentIndex((prev) => (prev - 1 + displayCards.length) % displayCards.length); }} className="p-6 bg-white rounded-3xl border border-slate-100 text-slate-300 flex justify-center hover:text-slate-500 transition-colors shadow-sm"><Icon name="chevron-left" /></button>
                                <button onClick={() => toggleLearned(currentCard.id)} className={`flex-1 p-6 rounded-3xl font-black flex items-center justify-center gap-3 transition-all ${learnedIds.includes(currentCard?.id) ? 'bg-green-500 text-white shadow-lg shadow-green-100' : 'bg-white border-2 border-slate-100 text-slate-400'}`}>
                                    <Icon name="check-circle" className={learnedIds.includes(currentCard?.id) ? "animate-bounce" : ""} /> {learnedIds.includes(currentCard?.id) ? '覚えた！' : '覚えた'}
                                </button>
                                <button onClick={() => { setIsFlipped(false); setCurrentIndex((prev) => (prev + 1) % displayCards.length); }} className="p-6 bg-white rounded-3xl border border-slate-100 text-slate-300 flex justify-center hover:text-slate-500 transition-colors shadow-sm"><Icon name="chevron-right" /></button>
                            </div>
                        </div>
                    )}

                    {/* Bottom Utility Bar */}
                    {!isQuizMode && (
                        <div className="mt-auto grid grid-cols-3 gap-2 py-4">
                            <button onClick={() => { setIsShuffleMode(!isShuffleMode); setCurrentIndex(0); }} className={`flex flex-col items-center gap-1 p-3 rounded-2xl transition-all ${isShuffleMode ? 'bg-orange-50 text-orange-600' : 'text-slate-300 hover:text-slate-500'}`}>
                                <Icon name="shuffle" className="w-5 h-5" />
                                <span className="text-[9px] font-black uppercase">Shuffle</span>
                            </button>
                            <button onClick={() => { setIsReverseMode(!isReverseMode); setIsFlipped(false); }} className={`flex flex-col items-center gap-1 p-3 rounded-2xl transition-all ${isReverseMode ? 'bg-indigo-50 text-indigo-600' : 'text-slate-300 hover:text-slate-500'}`}>
                                <Icon name="arrow-right-left" className="w-5 h-5" />
                                <span className="text-[9px] font-black uppercase">Reverse</span>
                            </button>
                            <button onClick={() => { if(confirm('進捗をリセットしますか？')) setLearnedIds(prev => prev.filter(id => !INITIAL_CARDS.some(c => c.category === selectedCategory && c.id === id))); }} className="flex flex-col items-center gap-1 p-3 rounded-2xl text-slate-300 hover:text-red-400 transition-all">
                                <Icon name="rotate-ccw" className="w-5 h-5" />
                                <span className="text-[9px] font-black uppercase">Reset</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
